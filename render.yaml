# Render Blueprint – CourtSense API
# Deploy: connect repo at render.com, or use "New Blueprint"
services:
  - type: web
    name: courtsense-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
